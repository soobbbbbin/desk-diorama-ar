<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Desk Diorama - WebXR Mobile AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <style>
    /* ── Global Reset ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* A-Frame scene fills the screen and is behind UI */
    a-scene {
      position: fixed !important;
      top: 0; left: 0;
      width: 100% !important;
      height: 100% !important;
      z-index: 1;
    }

    /* A-Frame canvas must NOT steal pointer events */
    a-scene canvas {
      pointer-events: none !important;
    }

    /* ── Main UI Wrapper ── */
    #ui-wrapper {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;   /* pass-through by default */
      z-index: 9999;
    }

    /* ── Splash / Pre-AR panel ── */
    #splash-panel {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      width: 88%;
      max-width: 400px;
      background: rgba(13, 17, 23, 0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(0, 210, 255, 0.25);
      border-radius: 18px;
      padding: 18px 16px;
      pointer-events: auto;   /* clickable */
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0,210,255,0.08);
    }

    .panel-title {
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      color: #00d2ff;
      letter-spacing: 0.6px;
      text-shadow: 0 0 14px rgba(0,210,255,0.5);
      margin-bottom: 4px;
    }

    .panel-sub {
      font-size: 11px;
      color: #8b949e;
      text-align: center;
      margin-bottom: 14px;
    }

    /* Slider row */
    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #c9d1d9;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #30363d;
      outline: none;
      pointer-events: auto;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #00d2ff;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0,210,255,0.7);
      transition: transform 0.1s;
    }
    input[type=range]::-webkit-slider-thumb:active { transform: scale(1.25); }

    /* Start AR button */
    #start-ar-btn {
      display: block;
      width: 100%;
      padding: 15px 0;
      background: linear-gradient(135deg, #00d2ff 0%, #0055ff 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,210,255,0.45);
      pointer-events: auto;
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    #start-ar-btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 8px rgba(0,210,255,0.3);
    }

    /* ── In-AR status strip (NO scanner rings/crosshairs) ── */
    #ar-status-bar {
      display: none;
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      width: 88%;
      max-width: 400px;
      background: rgba(13, 17, 23, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 210, 255, 0.2);
      border-radius: 14px;
      padding: 12px 16px;
      pointer-events: auto;
    }

    .status-text {
      font-size: 13px;
      color: #00d2ff;
      text-align: center;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 6px;
      background: #30363d;
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00d2ff, #0055ff);
      border-radius: 3px;
      transition: width 0.15s linear;
    }

    /* Exit AR small button */
    #exit-ar-btn {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 10px 0;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #8b949e;
      font-size: 12px;
      cursor: pointer;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
    }
    #exit-ar-btn:active { background: rgba(255,255,255,0.15); }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════
       A-FRAME SCENE
       renderer alpha=true → canvas is transparent in AR
       vr-mode-ui disabled → no split VR button
  ════════════════════════════════════════════════════ -->
  <a-scene
    webxr="allowedModes: ar; referenceSpaceType: local-floor; requiredFeatures: hit-test;"
    ar-hit-test-custom="target: #diorama-root; reticle: #scan-anchor;"
    renderer="colorManagement: true; antialias: true; alpha: true;"
    background="color: transparent;"
    vr-mode-ui="enabled: false">

    <!-- Lighting -->
    <a-light type="directional" intensity="1.2" position="2 4 3"></a-light>
    <a-light type="ambient" intensity="0.7"></a-light>

    <!-- Diorama Root (placed at hit-test surface) -->
    <a-entity id="diorama-root" position="0 0 0" visible="false">

      <!-- Invisible anchor used by hit-test component -->
      <a-entity id="scan-anchor"></a-entity>

      <!-- Base Plate -->
      <a-box
        id="diorama-base"
        position="0 -0.025 0"
        width="2.6" height="0.05" depth="2.6"
        color="#f2efe9" metalness="0.1" roughness="0.8">
      </a-box>

      <!-- Building Container (populated by JS) -->
      <a-entity id="buildings-container"></a-entity>

    </a-entity>
  </a-scene>

  <!-- ═══════════════════════════════════════════════════
       UI OVERLAY  (always on top, pointer-events managed per child)
  ════════════════════════════════════════════════════ -->
  <div id="ui-wrapper">

    <!-- Pre-AR splash panel -->
    <div id="splash-panel">
      <div class="panel-title">Desk Diorama AR</div>
      <div class="panel-sub">Point camera at a flat surface · tap to place</div>

      <div class="slider-row">
        <div class="slider-labels">
          <span id="clutter-status">Preview Scale</span>
          <span id="clutter-value">0%</span>
        </div>
        <input type="range" id="clutter-slider" min="0" max="1" step="0.01" value="0">
      </div>

      <button id="start-ar-btn">▶ Start AR Camera</button>
    </div>

    <!-- In-AR status strip (shown after enterAR) -->
    <div id="ar-status-bar">
      <div class="status-text" id="ar-status-text">Scanning for surface…</div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <button id="exit-ar-btn">✕ Exit AR</button>
    </div>

  </div>

  <!-- ═══════════════════════════════════════════════════
       CUSTOM A-FRAME COMPONENT
  ════════════════════════════════════════════════════ -->
  <script>
    AFRAME.registerComponent('ar-hit-test-custom', {
      schema: {
        target:  { type: 'selector' },
        reticle: { type: 'selector' }
      },
      init: function () {
        this.xrHitTestSource = null;
        this.viewerSpace     = null;
        this.printingStarted = false;
        this.printProgress   = 0;

        const scene = this.el.sceneEl;

        scene.addEventListener('enter-vr', () => {
          if (!scene.is('ar-mode')) return;

          // ── Transparent body for camera passthrough ──
          document.documentElement.style.background = 'transparent';
          document.body.style.background = 'transparent';

          // ── UI switch: hide splash, show status bar ──
          document.getElementById('splash-panel').style.display  = 'none';
          document.getElementById('ar-status-bar').style.display = 'block';
          document.getElementById('ar-status-text').textContent  = 'Scanning for surface…';
          document.getElementById('ar-status-text').style.color  = '#00d2ff';

          const session = scene.renderer.xr.getSession();

          // Tap on surface → start print
          session.addEventListener('select', () => {
            if (this.xrHitTestSource && !this.printingStarted) {
              this.printingStarted = true;
              document.getElementById('ar-status-text').textContent = '3D Printing…';
              document.getElementById('ar-status-text').style.color = '#58a6ff';
            }
          });

          session.requestReferenceSpace('viewer').then(space => {
            this.viewerSpace = space;
            session.requestHitTestSource({ space }).then(source => {
              this.xrHitTestSource = source;
            });
          });
        });

        scene.addEventListener('exit-vr', () => {
          document.documentElement.style.background = '';
          document.body.style.background = '';

          document.getElementById('splash-panel').style.display  = 'block';
          document.getElementById('ar-status-bar').style.display = 'none';

          this.printingStarted = false;
          this.printProgress   = 0;
          updatePrinting(0);

          if (this.data.target) this.data.target.setAttribute('visible', 'false');
        });
      },

      tick: function () {
        const frame = this.el.sceneEl.frame;
        if (!frame || !this.xrHitTestSource) return;

        if (!this.printingStarted) {
          const refSpace = this.el.sceneEl.renderer.xr.getReferenceSpace();
          const hits     = frame.getHitTestResults(this.xrHitTestSource);

          if (hits.length > 0) {
            const pose = hits[0].getPose(refSpace);
            const p    = pose.transform.position;

            this.data.target.setAttribute('position', `${p.x} ${p.y} ${p.z}`);
            this.data.target.setAttribute('visible', 'true');

            document.getElementById('ar-status-text').textContent = '✓ Surface found — tap to place';
            document.getElementById('ar-status-text').style.color = '#00ff88';
          } else {
            this.data.target.setAttribute('visible', 'false');
            document.getElementById('ar-status-text').textContent = 'Scanning for surface…';
            document.getElementById('ar-status-text').style.color = '#00d2ff';
          }

        } else if (this.printProgress < 1.0) {
          this.printProgress = Math.min(1.0, this.printProgress + 0.008);
          updatePrinting(this.printProgress);

          // Update progress bar
          document.getElementById('progress-fill').style.width =
            (this.printProgress * 100) + '%';

          if (this.printProgress >= 1.0) {
            document.getElementById('ar-status-text').textContent = '🏙 Build complete!';
            document.getElementById('ar-status-text').style.color = '#00ff88';
          }
        }
      }
    });
  </script>

  <!-- ═══════════════════════════════════════════════════
       MAIN APP SCRIPT
  ════════════════════════════════════════════════════ -->
  <script>
    /* ── Start AR button ── */
    document.getElementById('start-ar-btn').addEventListener('click', function () {
      const scene = document.querySelector('a-scene');
      if (scene.is('vr-mode') || scene.is('ar-mode')) return;

      if (typeof scene.enterAR === 'function') {
        scene.enterAR();
      } else {
        scene.enterVR();
      }
    });

    /* ── Exit AR button ── */
    document.getElementById('exit-ar-btn').addEventListener('click', function () {
      const scene = document.querySelector('a-scene');
      if (scene.is('vr-mode') || scene.is('ar-mode')) {
        scene.exitVR();
      }
    });

    /* ═══════════════════════════════
       Building grid generation
    ═══════════════════════════════ */
    const gridX = 4, gridZ = 4;
    const spacing = 0.65;
    const centerOffset = (gridX - 1) * spacing * 0.5;

    const buildingTypes = [
      { height: 0.40, color: '#eae7df', glassColor: '#1ba1e2' },
      { height: 0.70, color: '#d9d5cb', glassColor: '#00a8ff' },
      { height: 1.10, color: '#c9c4b7', glassColor: '#0984e3' }
    ];

    const layout = [0,1,2,1, 2,0,1,2, 1,2,0,1, 0,1,2,0];

    const container = document.getElementById('buildings-container');
    const buildings = [];

    for (let x = 0; x < gridX; x++) {
      for (let z = 0; z < gridZ; z++) {
        const type = buildingTypes[layout[x * gridZ + z]];
        const posX = x * spacing - centerOffset;
        const posZ = z * spacing - centerOffset;

        const root = document.createElement('a-entity');
        root.setAttribute('position', `${posX} 0 ${posZ}`);
        root.setAttribute('scale', '1 0.001 1'); // start collapsed

        const body = document.createElement('a-box');
        body.setAttribute('width',    '0.4');
        body.setAttribute('depth',    '0.4');
        body.setAttribute('height',   type.height.toString());
        body.setAttribute('color',    type.color);
        body.setAttribute('roughness','0.9');
        body.setAttribute('metalness','0.0');
        body.setAttribute('position', `0 ${type.height / 2} 0`);
        root.appendChild(body);

        const glass = document.createElement('a-box');
        glass.setAttribute('width',    '0.3');
        glass.setAttribute('depth',    '0.3');
        glass.setAttribute('height',   (type.height * 0.4).toString());
        glass.setAttribute('color',    type.glassColor);
        glass.setAttribute('material', 'transparent: true; opacity: 0.6; metalness: 0.9; roughness: 0.1');
        glass.setAttribute('position', `0 ${type.height * 0.7} 0`);
        root.appendChild(glass);

        container.appendChild(root);
        buildings.push({ element: root });
      }
    }

    function updatePrinting(progress) {
      const scaleY = Math.max(0.001, progress);
      buildings.forEach(b => {
        b.element.setAttribute('scale', `1 ${scaleY} 1`);
      });

      document.getElementById('clutter-slider').value = progress;
      document.getElementById('clutter-value').textContent = Math.round(progress * 100) + '%';
    }

    /* Slider preview (non-AR) */
    document.getElementById('clutter-slider').addEventListener('input', function () {
      const val = parseFloat(this.value);
      document.getElementById('clutter-status').textContent = 'Preview Scale';
      updatePrinting(val);
    });

    /* Init */
    updatePrinting(0);
  </script>
</body>
</html>
